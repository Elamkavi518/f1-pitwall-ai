<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 PitWall AI - Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --f1-red: #e10600;
  --dark: #060606;
  --panel: #111;
  --text: #fff;
  --muted: #777;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
header {
  padding: 15px;
  text-align: center;
  font-family: 'Orbitron';
  border-bottom: 1px solid #222;
  letter-spacing: 3px;
}

header span { color: var(--f1-red); }

/* CHAT AREA */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* MESSAGE */
.msg {
  margin-bottom: 15px;
}

.user {
  text-align: right;
}

.user span {
  background: var(--f1-red);
  padding: 10px;
  display: inline-block;
}

.ai span {
  background: var(--panel);
  padding: 10px;
  display: inline-block;
}

/* INPUT */
.input-area {
  display: flex;
  border-top: 1px solid #222;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
  background: #111;
  color: white;
}

button {
  padding: 15px;
  background: var(--f1-red);
  border: none;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

</style>
</head>

<body>

<header>F1 <span>PITWALL</span> AI</header>

<div id="chat"></div>

<div class="input-area">
  <input id="userInput" placeholder="Ask about any F1 driver...">
  <button onclick="sendMessage()">➤</button>

/* =========================
   CHAT FUNCTION
========================= */

function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.toLowerCase().trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  let reply = "Driver not found. Try another name.";

  for (let name in drivers) {
    if (text.includes(name)) {
      const d = drivers[name];
      reply = `
<b>${name.toUpperCase()}</b><br>
🏆 Championships: ${d.championships}<br>
🏁 Races: ${d.races}<br>
⚡ Best Lap: ${d.bestLap}<br>
📍 Best Track: ${d.bestTrack}<br>
🔥 Best Races: ${d.bestRaces}<br>
💥 Accidents: ${d.accidents}<br>
📊 Performance: ${d.performance}
      `;
    }
  }

  setTimeout(() => {
    addMessage(reply, "ai");
  }, 400);
}

/* ADD MESSAGE */
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;

  div.innerHTML = `<span>${text}</span>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
