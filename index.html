<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 AI PitWall</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --f1-red: #e10600;
  --bg-dark: #050505;
  --text: #ffffff;
  --muted: #888;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  overflow: hidden;
}

/* ANIMATED GRID BACKGROUND */
body::before {
  content: '';
  position: fixed;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: moveGrid 20s linear infinite;
  z-index: 0;
}

@keyframes moveGrid {
  from { transform: translate(0,0); }
  to { transform: translate(-60px, -60px); }
}

/* RED GLOW LINE */
.scanline {
  position: fixed;
  top: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--f1-red), transparent);
  animation: scan 4s linear infinite;
}

@keyframes scan {
  0% { top: 0; opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* MAIN CONTAINER */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 2rem;
}

/* TITLE */
.title {
  font-family: 'Orbitron', sans-serif;
  font-size: 3rem;
  letter-spacing: 6px;
  margin-bottom: 1rem;
  animation: fadeUp 1s ease forwards;
}

.title span {
  color: var(--f1-red);
}

/* DESCRIPTION */
.desc {
  color: var(--muted);
  max-width: 500px;
  line-height: 1.6;
  margin-bottom: 3rem;
  animation: fadeUp 1.5s ease forwards;
}

/* BUTTON */
.btn {
  padding: 15px 40px;
  font-size: 1rem;
  border: none;
  cursor: pointer;
  color: white;
  background: var(--f1-red);
  font-family: 'Orbitron';
  letter-spacing: 2px;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
  animation: fadeUp 2s ease forwards;
}

/* BUTTON HOVER EFFECT */
.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transform: translateX(-100%);
}

.btn:hover::before {
  transform: translateX(100%);
  transition: 0.5s;
}

.btn:hover {
  box-shadow: 0 0 25px rgba(225,6,0,0.7);
  transform: scale(1.05);
}

/* FADE ANIMATION */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* FOOTER */
.footer {
  position: absolute;
  bottom: 15px;
  font-size: 0.7rem;
  color: #555;
}

</style>
</head>

<body>

<div class="scanline"></div>

<div class="container">
  <h1 class="title">F1 <span>PITWALL</span> AI</h1>

  <p class="desc">
    Advanced Formula 1 race intelligence system.  
    Analyze drivers, race strategy, telemetry data, and performance insights powered by AI.
  </p>

  <button class="btn" onclick="goToChat()">
    ENTER PITWALL
  </button>
</div>

<div class="footer">
  Built for F1 Strategy Analysis • Level 4 Project
</div>

<script>
function goToChat() {
  window.location.href = "chatbot.html"; // your chatbot page
}
</script>

</body>
</html>
